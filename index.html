<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쉐키나 동선표</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf8f0;
    --warm-white: #fffcf7;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --coral: #e8705a;
    --coral-light: #f5c4bb;
    --sage: #7a9e7e;
    --sage-light: #c8deca;
    --blue-soft: #8aafc4;
    --blue-bg: #eef4f8;
    --peach-bg: #fdf0eb;
    --text-dark: #2c2c2c;
    --text-mid: #5a5a5a;
    --text-light: #9a9a9a;
    --shadow: rgba(0,0,0,0.08);
    --shadow-deep: rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0a0a;
    color: #f0ece6;
    min-height: 100vh;
  }

  /* ─── NAV ─── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 60px;
    box-shadow: 0 2px 16px var(--shadow);
  }
  .nav-logo img {
    height: 42px; width: auto; object-fit: contain;
  }
  .nav-tabs { display: flex; gap: 4px; }
  .tab-btn {
    padding: 8px 20px; border-radius: 24px; border: 1.5px solid transparent;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .25s;
    background: transparent; color: var(--text-mid);
  }
  .tab-btn.active {
    background: var(--coral); color: white; border-color: var(--coral);
    box-shadow: 0 4px 12px rgba(232,112,90,0.3);
  }
  .tab-btn:hover:not(.active) { background: var(--peach-bg); color: var(--coral); }

  /* ─── PAGES ─── */
  .page { display: none; padding: 32px; max-width: 1100px; margin: 0 auto; }
  .page.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

  /* ─── PUBLIC PAGE ─── */
  .pub-logo-wrap {
    display: flex; align-items: center; gap: 20px; margin-bottom: 10px;
  }
  .pub-logo-img {
    height: 78px; width: auto; object-fit: contain;
  }
  .pub-week-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 33px; font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.5px;
  }
  .week-sub { color: #b0aa9e; font-size: 15px; margin-bottom: 108px; font-weight: 300; }

  .global-info {
    display: flex; gap: 16px; flex-wrap: wrap; margin-top: -180px; margin-bottom: 0;
  }
  .global-badge {
    display: flex; align-items: center; gap: 8px;
    background: white; border-radius: 24px; padding: 8px 16px;
    box-shadow: 0 2px 10px var(--shadow); font-size: 15px;
    border: 1px solid var(--gold-light);
    color: var(--text-dark);
  }
  .global-badge .badge-icon { font-size: 16px; }

  .session-card {
    background: white; border-radius: 20px; margin-bottom: 224px;
    box-shadow: 0 4px 24px var(--shadow); overflow: hidden;
    border: 1px solid rgba(0,0,0,0.04);
    transition: transform .2s, box-shadow .2s;
  }
  .session-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow-deep); }

  .session-header {
    padding: 18px 28px; display: flex; align-items: center; gap: 12px;
  }
  .session-header.coral { background: linear-gradient(135deg, #fdf0eb, #fce8e3); }
  .session-header.blue  { background: linear-gradient(135deg, #eef4f8, #e2edf5); }
  .session-header.sage  { background: linear-gradient(135deg, #f0f5f0, #e4ede5); }
  .session-header.peach { background: linear-gradient(135deg, #fef5ee, #fde8da); }

  .pin-icon { font-size: 20px; }
  .session-title { font-size: 22px; font-weight: 700; color: var(--text-dark); }
  .session-time {
    margin-left: auto; font-size: 12px; font-weight: 500;
    color: white; background: var(--coral); padding: 4px 12px; border-radius: 20px; font-size: 15px;
  }
  .session-header.blue  .session-time { background: var(--blue-soft); }
  .session-header.sage  .session-time { background: var(--sage); }
  .session-header.peach .session-time { background: #d4956a; }

  .seat-grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 12px; padding: 24px;
  }

  .seat-card {
    background: #fffdfc; border-radius: 14px;
    border: 1.5px solid #f8e8de;
    padding: 14px 10px; text-align: center;
    transition: all .2s; position: relative;
  }
  .seat-card:hover { border-color: #ff8ab0; transform: scale(1.03); }

  .seat-numbers {
    display: flex; justify-content: center; gap: 4px;
    margin-bottom: 12px; font-size: 11px;
  }
  .seat-num {
    background: #f0f0f0; color: var(--text-mid);
    padding: 2px 6px; border-radius: 6px; font-weight: 500;
  }
  .mic-num {
    background: var(--coral-light); color: var(--coral);
    padding: 2px 6px; border-radius: 6px; font-weight: 700;
  }

  .seat-photo {
    width: 97px; height: 97px; border-radius: 50%; object-fit: cover;
    margin: 0 auto 8px;
    border: none;
    box-shadow: none;
    display: block; background: #f0ede8;
  }
  .seat-photo-placeholder {
    width: 97px; height: 97px; border-radius: 50%;
    margin: 0 auto 8px; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--cream), #e8e0d5);
    border: none;
    font-size: 22px; color: var(--text-light);
  }

  .seat-name {
    font-size: 14px; font-weight: 700; color: var(--text-dark);
    line-height: 1.2; letter-spacing: 0.04em;
  }
  .seat-empty .seat-name { color: var(--text-light); font-weight: 400; }

  .session-notes {
    padding: 14px 24px 20px;
    display: flex; flex-direction: column; gap: 6px;
    border-top: 1px solid #f0ece6;
  }
  .note-item { font-size: 16px; color: var(--text-mid); display: flex; gap: 8px; }
  .note-item .note-icon { flex-shrink: 0; }

  /* ─── ADMIN PAGE ─── */
  .admin-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
  }
  .admin-title { font-size: 26px; font-weight: 900; color: var(--text-dark); }
  .admin-title span { color: var(--coral); }

  .admin-toolbar {
    display: flex; gap: 10px;
  }
  .btn {
    padding: 10px 20px; border-radius: 10px; border: none;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--coral); color: white; box-shadow: 0 4px 12px rgba(232,112,90,.3); }
  .btn-primary:hover { background: #d45f47; transform: translateY(-1px); }
  .btn-secondary { background: white; color: var(--text-mid); border: 1.5px solid var(--gold-light); }
  .btn-secondary:hover { background: var(--cream); color: var(--coral); }
  .btn-danger { background: #fff0ee; color: var(--coral); border: 1.5px solid var(--coral-light); }
  .btn-danger:hover { background: var(--coral); color: white; }
  .btn-success { background: var(--sage); color: white; }
  .btn-success:hover { background: #69937d; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* Global info admin */
  .admin-section {
    background: white; border-radius: 16px; padding: 24px;
    box-shadow: 0 2px 16px var(--shadow); margin-bottom: 24px;
    border: 1px solid rgba(0,0,0,0.04);
  }
  .admin-section-title {
    font-size: 15px; font-weight: 700; color: var(--text-dark);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .admin-section-title::before {
    content: ''; width: 4px; height: 18px; background: var(--coral); border-radius: 2px;
  }

  .global-fields { display: flex; gap: 12px; flex-wrap: wrap; }
  .field-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
  .field-group label { font-size: 12px; font-weight: 500; color: var(--text-mid); }
  .field-group input, .field-group select, .field-group textarea {
    padding: 10px 12px; border: 1.5px solid #e8e2d8; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    background: var(--warm-white); color: var(--text-dark);
    transition: border-color .2s; outline: none;
  }
  .field-group input:focus, .field-group select:focus, .field-group textarea:focus {
    border-color: var(--coral); box-shadow: 0 0 0 3px rgba(232,112,90,.1);
  }

  /* Session editor */
  .sessions-list { display: flex; flex-direction: column; gap: 16px; }
  .admin-session {
    background: white; border-radius: 16px;
    box-shadow: 0 2px 16px var(--shadow); overflow: hidden;
    border: 1px solid rgba(0,0,0,0.04);
  }
  .admin-session-header {
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    background: var(--cream); border-bottom: 1px solid #ece8e2; cursor: pointer;
  }
  .admin-session-header:hover { background: #fdf3ee; }
  .session-color-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--coral); flex-shrink: 0;
  }
  .admin-session-name { font-weight: 700; font-size: 14px; flex: 1; }
  .session-toggle { font-size: 12px; color: var(--text-light); transition: transform .2s; }
  .admin-session.collapsed .session-toggle { transform: rotate(-90deg); }

  .admin-session-body { padding: 20px; display: block; }
  .admin-session.collapsed .admin-session-body { display: none; }

  .session-meta-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .session-meta-row .field-group { min-width: 160px; }

  /* Seat editor grid */
  .seat-editor-grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 10px; margin-bottom: 16px;
  }
  .seat-editor {
    background: var(--warm-white); border-radius: 12px;
    border: 1.5px solid var(--gold-light); padding: 12px 8px;
    display: flex; flex-direction: column; gap: 6px; align-items: center;
  }
  .seat-editor-nums { display: flex; gap: 4px; width: 100%; }
  .seat-editor-nums input {
    width: 50%; padding: 5px 6px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 11px; text-align: center; background: white;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .seat-editor-nums input:first-child { border-right: none; border-radius: 6px 0 0 6px; }
  .seat-editor-nums input:last-child { border-left: 1px solid #ddd; border-radius: 0 6px 6px 0; }
  .seat-editor-nums input:focus { outline: none; border-color: var(--coral); background: #fffaf8; }

  .seat-photo-editor {
    width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    background: linear-gradient(135deg, #f5f0ea, #ede5db);
    border: none; display: flex; align-items: center; justify-content: center;
    font-size: 18px; overflow: hidden; position: relative; transition: all .2s;
  }
  .seat-photo-editor:hover { border-color: var(--coral); background: var(--peach-bg); }
  .seat-photo-editor img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .seat-photo-editor input[type=file] { display: none; }

  .seat-name-input {
    width: 100%; padding: 5px 7px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 12px; text-align: center; background: white;
    font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
  }
  .seat-name-input:focus { outline: none; border-color: var(--coral); }

  .seat-row-label {
    grid-column: 1 / -1; font-size: 11px; font-weight: 700;
    color: var(--text-light); text-transform: uppercase; letter-spacing: 1px;
    padding: 4px 0 0; border-top: 1px dashed #e0d9d0;
    display: flex; align-items: center; gap: 6px;
  }
  .seat-row-label:first-child { border-top: none; }

  .notes-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .notes-row .field-group { min-width: 200px; }

  .add-session-btn {
    width: 100%; padding: 16px; border: 2px dashed var(--gold-light);
    border-radius: 16px; background: transparent; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--text-light); transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .add-session-btn:hover { border-color: var(--coral); color: var(--coral); background: var(--peach-bg); }

  /* Color picker for session */
  .color-options { display: flex; gap: 8px; }
  .color-opt {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2.5px solid transparent; transition: all .15s;
  }
  .color-opt.selected { border-color: var(--text-dark); transform: scale(1.2); }

  /* Save bar */
  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 1px solid var(--gold-light);
    padding: 14px 32px; display: flex; justify-content: flex-end; gap: 10px;
    box-shadow: 0 -4px 20px var(--shadow);
    transform: translateY(100%); transition: transform .3s;
    z-index: 99;
  }
  .save-bar.visible { transform: translateY(0); }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text-dark); color: white; padding: 12px 24px; border-radius: 30px;
    font-size: 13px; font-weight: 500; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 700px) {
    .page { padding: 16px; }
    .seat-grid { grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px; }
    .seat-editor-grid { grid-template-columns: repeat(3,1fr); }
    .nav { padding: 0 16px; }
    .week-title { font-size: 26px; }
  }

  /* ── 사진 인스타그램 물결 장식 ── */
  @keyframes ig-spin  { 0%   { transform: rotate(0deg); }   100% { transform: rotate(360deg); } }
  @keyframes ig-spin2 { 0%   { transform: rotate(0deg); }   100% { transform: rotate(-360deg); } }
  @keyframes ig-blob-morph {
    0%,100% { d: path("M108,57 C108,85.2 85.2,108 57,108 C28.8,108 6,85.2 6,57 C6,28.8 28.8,6 57,6 C85.2,6 108,28.8 108,57 Z"); }
    25%     { d: path("M105,48 C112,68 95,98 68,107 C41,116 12,98 5,72 C-2,46 14,16 40,8 C66,0 98,28 105,48 Z"); }
    50%     { d: path("M107,62 C110,84 88,112 62,111 C36,110 8,88 5,64 C2,40 20,10 46,6 C72,2 104,40 107,62 Z"); }
    75%     { d: path("M103,52 C114,74 96,104 70,110 C44,116 14,100 7,76 C0,52 16,18 42,9 C68,0 92,30 103,52 Z"); }
  }
  .photo-ring-wrap {
    position: relative; width: 97px; height: 97px;
    margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
  }
  .photo-ring-wrap .ig-ring-1 {
    position: absolute;
    top: 50%; left: 50%;
    width: 111px; height: 111px;
    margin-left: -55.5px; margin-top: -55.5px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #5500aa 0%, #aa0088 20%, #dd0055 38%,
      #cc2200 55%, #dd7700 72%,
      #cc9900 86%, #5500aa 100%
    );
    animation: ig-spin 4s linear infinite;
    opacity: 0.85;
  }
  .photo-ring-wrap .ig-ring-2 {
    position: absolute;
    top: 50%; left: 50%;
    width: 109px; height: 109px;
    margin-left: -54.5px; margin-top: -54.5px;
    border-radius: 50%;
    background: conic-gradient(
      from 90deg,
      #bb0077 0%, #ee3300 28%,
      #cc8800 55%, #990099 78%, #bb0077 100%
    );
    animation: ig-spin2 6s linear infinite;
    opacity: 0.55;
    mix-blend-mode: screen;
  }
  .photo-ring-wrap .ig-mask {
    position: absolute;
    top: 50%; left: 50%;
    width: 97px; height: 97px;
    margin-left: -48.5px; margin-top: -48.5px;
    border-radius: 50%;
    background: #0a0a0a;
    z-index: 0;
  }
  .photo-ring-wrap .seat-photo,
  .photo-ring-wrap .seat-photo-placeholder {
    width: 97px; height: 97px; margin: 0;
    position: relative; z-index: 1;
  }


  /* 관리자 페이지 아이보리 배경 */
  #page-admin {
    background: var(--cream);
    border-radius: 16px;
    min-height: 100vh;
  }


  /* 중간 배지 (3번째 세션 다음) */
  .global-info.mid-badges {
    margin-top: -180px; margin-bottom: 224px; padding-bottom: 0;
  }


  /* ── 색상 팔레트 16색 그리드 ── */
  .color-options-grid {
    display: grid !important;
    grid-template-columns: repeat(8, 22px);
    gap: 5px !important;
  }

  /* ── 단원 리스트 ── */
  .member-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; background: var(--warm-white);
    border-radius: 10px; border: 1px solid var(--gold-light);
  }
  .member-thumb {
    width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
    border: 1.5px solid var(--gold-light); flex-shrink: 0;
  }
  .member-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-dark); }
  .member-empty { color: var(--text-light); font-size: 13px; padding: 12px 0; }

  /* ── 자리 편집기 사진 썸네일 ── */
  .seat-photo-thumb {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #f5f0ea, #ede5db);
    border: 2px solid var(--gold-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; overflow: hidden; margin-bottom: 2px;
  }
  .seat-photo-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  /* ── 자리 이름 셀렉트 ── */
  .seat-name-select {
    width: 100%; padding: 4px 5px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 11px; background: white; font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-dark); cursor: pointer;
  }
  .seat-name-select:focus { outline: none; border-color: var(--coral); }

</style>
</head>

// ══════════════ ADMIN RENDER ══════════════
function renderAdmin() {
  document.getElementById('adm-title').value = state.title;
  document.getElementById('adm-sub').value = state.sub;
  document.getElementById('adm-dresscode').value = state.dresscode || '';
  document.getElementById('adm-holiday').value = state.holiday || '';
  document.getElementById('adm-longholiday').value = state.longholiday || '';

  const list = document.getElementById('adm-sessions-list');
  list.innerHTML = '';
  state.sessions.forEach((sess, si) => {
    list.appendChild(buildSessionEditor(sess, si));
  });
  // 모든 셀렉트 옵션 채우기
  setTimeout(() => {
    renderMemberList();
    state.sessions.forEach((_, si) => refreshSessionSelects(si));
  }, 0);
}

function buildSessionEditor(sess, si) {
  const div = document.createElement('div');
  div.className = 'admin-session';
  div.id = `sess-editor-${si}`;

  // Color dot colors - 16색 팔레트
  const colorOpts = COLORS.map(c =>
    `<div class="color-opt ${c === sess.color ? 'selected' : ''}"
      style="background:${COLOR_HEX[c]}" title="${c}"
      onclick="setSessionColor(${si},'${c}',this)"></div>`
  ).join('');

  // Seat editors - 이름을 토글 선택으로
  let seatsHTML = '';
  for (let row = 0; row < 2; row++) {
    seatsHTML += `<div class="seat-row-label">🎤 ${row+1}줄 (${row*6+1}~${row*6+6}번 자리)</div>`;
    for (let col = 0; col < 6; col++) {
      const idx = row * 6 + col;
      const seat = sess.seats[idx] || { seat: String(idx+1), mic: '', name: '' };
      const photoSrc = seat.name && memberStore[seat.name] ? memberStore[seat.name] : '';
      seatsHTML += `
        <div class="seat-editor" id="seat-ed-${si}-${idx}">
          <div class="seat-editor-nums">
            <input type="text" placeholder="자리" value="${seat.seat}" title="자리번호"
              oninput="updateSeat(${si},${idx},'seat',this.value)">
            <input type="text" placeholder="마이크" value="${seat.mic}" title="마이크번호"
              oninput="updateSeat(${si},${idx},'mic',this.value)">
          </div>
          <div class="seat-photo-thumb" id="thumb-${si}-${idx}">
            ${photoSrc ? `<img src="${photoSrc}" alt="${seat.name}">` : '<span>📷</span>'}
          </div>
          <select class="seat-name-select" onchange="selectSeatMember(${si},${idx},this.value)">
            <option value="">— 선택 —</option>
          </select>
        </div>`;
    }
  }

  // Notes
  const notesHTML = (sess.notes || []).map((n, ni) => `
    <div class="global-fields" style="align-items:center;gap:8px">
      <div class="field-group" style="max-width:60px">
        <label>아이콘</label>
        <input type="text" value="${n.icon}" oninput="updateNote(${si},${ni},'icon',this.value)" style="text-align:center">
      </div>
      <div class="field-group" style="flex:1">
        <label>내용</label>
        <input type="text" value="${n.text}" oninput="updateNote(${si},${ni},'text',this.value)">
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeNote(${si},${ni})" style="margin-top:18px">✕</button>
    </div>
  `).join('');

  div.innerHTML = `
    <div class="admin-session-header" onclick="toggleSession(${si})">
      <div class="session-color-dot" style="background:${COLOR_HEX[sess.color]}"></div>
      <div class="admin-session-name">${sess.title || '(제목 없음)'}</div>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();removeSession(${si})">삭제</button>
      <div class="session-toggle">▼</div>
    </div>
    <div class="admin-session-body">
      <div class="session-meta-row">
        <div class="field-group" style="flex:2">
          <label>세션 제목</label>
          <input type="text" value="${sess.title}" placeholder="3/25 수요저녁기도회"
            oninput="updateSession(${si},'title',this.value)">
        </div>
        <div class="field-group">
          <label>시간 정보</label>
          <input type="text" value="${sess.time}" placeholder="pm 6:55 → 대기실"
            oninput="updateSession(${si},'time',this.value)">
        </div>
        <div class="field-group" style="min-width:240px">
          <label>카드 색상</label>
          <div class="color-options color-options-grid" style="padding:8px 0">${colorOpts}</div>
        </div>
      </div>
      <div class="seat-editor-grid">${seatsHTML}</div>
      <div style="margin-bottom:12px">
        <div class="admin-section-title" style="font-size:13px;margin-bottom:10px">메모 / 안내</div>
        <div id="notes-${si}">${notesHTML}</div>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addNote(${si})">＋ 메모 추가</button>
      </div>
    </div>`;
  return div;
}

function toggleSession(si) {
  const el = document.getElementById(`sess-editor-${si}`);
  el.classList.toggle('collapsed');
}
function setSessionColor(si, color, el) {
  state.sessions[si].color = color;
  el.closest('.color-options').querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  const hex = COLOR_HEX[color] || color;
  document.querySelector(`#sess-editor-${si} .session-color-dot`).style.background = hex;
  markDirty();
}
function updateSession(si, key, val) {
  state.sessions[si][key] = val;
  if (key === 'title') {
    document.querySelector(`#sess-editor-${si} .admin-session-name`).textContent = val || '(제목 없음)';
  }
  markDirty();
}
function updateSeat(si, idx, key, val) {
  if (!state.sessions[si].seats[idx]) state.sessions[si].seats[idx] = { seat:'', mic:'', name:'' };
  state.sessions[si].seats[idx][key] = val;
  markDirty();
}

function selectSeatMember(si, idx, name) {
  if (!state.sessions[si].seats[idx]) state.sessions[si].seats[idx] = { seat: String(idx+1), mic:'', name:'' };
  state.sessions[si].seats[idx].name = name;
  // 단원 리스트에서 사진 자동 세팅
  if (name && memberStore[name]) {
    photoStore[`${si}-${idx}`] = memberStore[name];
  } else if (!name) {
    delete photoStore[`${si}-${idx}`];
  }
  // 섬네일 업데이트
  const thumb = document.getElementById(`thumb-${si}-${idx}`);
  if (thumb) {
    const src = name && memberStore[name] ? memberStore[name] : '';
    thumb.innerHTML = src ? `<img src="${src}" alt="${stripExt(name)}">` : '<span>📷</span>';
  }
  // 같은 세션의 다른 셀렉트 갱신 (중복 방지)
  refreshSessionSelects(si);
  markDirty();
}

function refreshSessionSelects(si) {
  const sess = state.sessions[si];
  // 현재 이 세션에서 선택된 파일명들
  const usedNames = new Set(sess.seats.map(s => s && s.name).filter(Boolean));
  // 휴가/장기휴가 이름(순수이름+파일명 모두 포함)
  const holidayNames = getHolidayNames();
  const excluded = new Set([...usedNames, ...holidayNames]);

  for (let idx = 0; idx < 12; idx++) {
    const sel = document.querySelector(`#seat-ed-${si}-${idx} .seat-name-select`);
    if (!sel) continue;
    const currentVal = (sess.seats[idx] && sess.seats[idx].name) || '';
    const members = Object.keys(memberStore);
    sel.innerHTML = '<option value="">— 선택 —</option>';
    members.forEach(name => {
      // 현재 자리에 선택된 이름이면 표시, 다른 자리/휴가에 있으면 제외
      const isCurrentSeat = (name === currentVal);
      const isExcluded = excluded.has(name) || excluded.has(stripExt(name));
      if (isCurrentSeat || !isExcluded) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = stripExt(name);
        opt.selected = isCurrentSeat;
        sel.appendChild(opt);
      }
    });
  }
}

function getHolidayNames() {
  const holiday = document.getElementById('adm-holiday')?.value || state.holiday || '';
  const longHoliday = document.getElementById('adm-longholiday')?.value || state.longholiday || '';
  const baseNames = new Set();
  // "이름(숫자)" 또는 "이름, 이름" 형식 파싱 → 순수 이름(확장자 없이)
  [holiday, longHoliday].forEach(str => {
    str.split(/[,，\s]+/).forEach(part => {
      const clean = part.replace(/\(\d+\)/, '').trim();
      if (clean) baseNames.add(clean);
    });
  });
  // memberStore 키(파일명)도 포함: stripExt(key)가 baseNames에 있으면 파일명도 excluded에 추가
  const names = new Set(baseNames);
  Object.keys(memberStore).forEach(filename => {
    if (baseNames.has(stripExt(filename))) {
      names.add(filename);
      names.add(stripExt(filename));
    }
  });
  return names;
}

function refreshAllSelects() {
  state.sessions.forEach((_, si) => refreshSessionSelects(si));
}
function updateNote(si, ni, key, val) {
  state.sessions[si].notes[ni][key] = val;
  markDirty();
}
function addNote(si) {
  if (!state.sessions[si].notes) state.sessions[si].notes = [];
  state.sessions[si].notes.push({ icon: '📌', text: '' });
  renderAdmin(); markDirty();
}
function removeNote(si, ni) {
  state.sessions[si].notes.splice(ni, 1);
  renderAdmin(); markDirty();
}
function addSession() {
  state.sessions.push({
    title: '새 세션', time: '→ 대기실',
    color: COLORS[state.sessions.length % COLORS.length],
    notes: [], seats: Array.from({length:12}, (_,i) => ({ seat:String(i+1), mic:'', name:'' }))
  });
  renderAdmin(); markDirty();
}
function removeSession(si) {
  if (!confirm('이 세션을 삭제할까요?')) return;
  // Clean photos
  for (let i = 0; i < 12; i++) delete photoStore[`${si}-${i}`];
  state.sessions.splice(si, 1);
  renderAdmin(); markDirty();
}

// ── 단원 리스트 관련 ──────────────────────────────────────
function renderMemberList() {
  const listEl = document.getElementById('member-list');
  if (!listEl) return;
  const names = Object.keys(memberStore);
  if (names.length === 0) {
    listEl.innerHTML = '<div class="member-empty">업로드된 단원이 없습니다</div>';
    return;
  }
  listEl.innerHTML = names.map((name, i) => `
    <div class="member-item" id="member-item-${i}">
      <img src="${memberStore[name]}" alt="${stripExt(name)}" class="member-thumb">
      <span class="member-name">${stripExt(name)}</span>
      <button class="btn btn-danger btn-sm member-del-btn" data-idx="${i}">삭제</button>
    </div>
  `).join('');
  // 이벤트 위임으로 삭제 처리
  listEl.querySelectorAll('.member-del-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx);
      const allNames = Object.keys(memberStore);
      if (idx >= 0 && idx < allNames.length) deleteMember(allNames[idx]);
    });
  });
}

function uploadMember() {
  document.getElementById('member-upload-input').click();
}

function handleMemberUpload(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      memberStore[file.name] = e.target.result;
      done++;
      if (done === files.length) {
        localStorage.setItem('shekinah_members', JSON.stringify(memberStore));
        renderMemberList();
        state.sessions.forEach((_, si) => refreshSessionSelects(si));
        showToast(`✅ ${done}개 업로드 완료`);
      }
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function deleteMember(name) {
  if (!confirm(`'${name}' 을(를) 삭제할까요?`)) return;
  delete memberStore[name];
  // 이 멤버가 들어간 자리 초기화
  state.sessions.forEach((sess, si) => {
    sess.seats.forEach((seat, idx) => {
      if (seat && seat.name === name) {
        seat.name = '';
        delete photoStore[`${si}-${idx}`];
      }
    });
  });
  localStorage.setItem('shekinah_members', JSON.stringify(memberStore));
  renderMemberList();
  renderAdmin();
  showToast(`🗑 '${name}' 삭제됨`);
}

}

function renderPublic() {
  // Title
  const titleEl = document.getElementById('pub-week-title');
  if (titleEl) {
    const match = state.title.match(/(쉐키나\s*)(.+)/);
    titleEl.textContent = match ? match[2] : state.title;
  }
  document.getElementById('pub-week-sub').textContent = state.sub;

  // Global badges
  const gi = document.getElementById('pub-global-info');
  gi.innerHTML = '';
  const badges = [
    state.dresscode && { icon:'🎨', label:`드레스코드: ${state.dresscode}` },
    state.holiday   && { icon:'🌈', label:`휴가: ${state.holiday}` },
    state.longholiday && { icon:'🙏', label:`장기휴가: ${state.longholiday}` },
  ].filter(Boolean);
  badges.forEach(b => {
    gi.innerHTML += `<div class="global-badge"><span class="badge-icon">${b.icon}</span><span>${b.label}</span></div>`;
  });

  // Sessions
  const container = document.getElementById('pub-sessions');
  container.innerHTML = '';
  const badgesHTML = badges.length
    ? `<div class="global-info mid-badges">${badges.map(b=>`<div class="global-badge"><span class="badge-icon">${b.icon}</span><span>${b.label}</span></div>`).join('')}</div>`
    : '';
  state.sessions.forEach((sess, si) => {
    container.appendChild(buildSessionCard(sess, si));
    // 세 번째 세션(index 2) 다음에 배지 삽입
    if (si === 2 && badges.length) {
      const midDiv = document.createElement('div');
      midDiv.innerHTML = badgesHTML;
      container.appendChild(midDiv.firstElementChild);
    }
  });
}

function buildSessionCard(sess, si) {
  const card = document.createElement('div');
  card.className = 'session-card';

  // Header
  let seatsHTML = '';
  for (let i = 0; i < 12; i++) {
    const seat = sess.seats[i] || { seat: String(i+1), mic:'', name:'' };
    const photoKey = `${si}-${i}`;
    const photoSrc = photoStore[photoKey] || (seat.name && memberStore[seat.name]) || null;
    const innerPhoto = photoSrc
      ? `<img class="seat-photo" src="${photoSrc}" alt="${seat.name}">`
      : `<div class="seat-photo-placeholder">➖</div>`;
    // 자리마다 다른 그라데이션 시작각도 (30도씩 shift)
    const offsets1 = [0,60,120,180,240,300,30,90,150,210,270,330];
    const offsets2 = [90,150,210,270,330,30,120,0,60,240,300,180];
    const off1 = offsets1[i] || 0;
    const off2 = offsets2[i] || 90;
    const ring1Style = `background:conic-gradient(from ${off1}deg, #5500aa 0%, #aa0088 20%, #dd0055 38%, #cc2200 55%, #dd7700 72%, #cc9900 86%, #5500aa 100%)`;
    const ring2Style = `background:conic-gradient(from ${off2}deg, #bb0077 0%, #ee3300 28%, #cc8800 55%, #990099 78%, #bb0077 100%)`;
    const photoEl = `<div class="photo-ring-wrap"><div class="ig-ring-1" style="${ring1Style}"></div><div class="ig-ring-2" style="${ring2Style}"></div><div class="ig-mask"></div>${innerPhoto}</div>`;
    const isEmpty = !seat.name;
    seatsHTML += `
      <div class="seat-card ${isEmpty ? 'seat-empty' : ''}">
        <div class="seat-numbers">
          <span class="seat-num">위치-${seat.seat || i+1}</span>
          ${seat.mic ? `<span class="mic-num">${seat.mic}-마이크</span>` : ''}
        </div>
        ${photoEl}
        <div class="seat-name">${seat.name ? stripExt(seat.name) : '—'}</div>
      </div>`;
  }

  const notesHTML = (sess.notes || []).map(n =>
    `<div class="note-item"><span class="note-icon">${n.icon}</span><span>${n.text}</span></div>`
  ).join('');

  const colorHex = COLOR_HEX[sess.color] || sess.color || '#e8705a';
  // 헤더 배경은 해당 색의 연한 버전
  const r = parseInt(colorHex.slice(1,3),16);
  const g = parseInt(colorHex.slice(3,5),16);
  const b = parseInt(colorHex.slice(5,7),16);
  const headerBg = `rgba(${r},${g},${b},0.12)`;
  const headerBg2 = `rgba(${r},${g},${b},0.06)`;
  card.innerHTML = `
    <div class="session-header" style="background:linear-gradient(135deg,${headerBg},${headerBg2})">
      <span class="pin-icon">📌</span>
      <span class="session-title">${sess.title}</span>
      ${sess.time ? `<span class="session-time" style="background:${colorHex}">${sess.time}</span>` : ''}
    </div>
    <div class="seat-grid">${seatsHTML}</div>
    ${notesHTML ? `<div class="session-notes">${notesHTML}</div>` : ''}`;
  return card;
}

// ══════════════ NAVIGATION ══════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${id}`).classList.add('active');
  event.currentTarget.classList.add('active');
  if (id === 'public') renderPublic();
}

function previewPublic() {
  readAdminFields();
  renderPublic();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-public').classList.add('active');
  document.querySelector('.tab-btn').classList.add('active');
  showToast('👁 미리보기 모드');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}


// ── 이미지 저장 ─────────────────────────────────
async function saveAsImage() {
  const btn = document.getElementById('save-img-btn');
  btn.textContent = '⏳ 저장 중...';
  btn.disabled = true;
  try {
    const target = document.getElementById('page-public');
    // 버튼 잠시 숨기기
    btn.style.display = 'none';
    const canvas = await html2canvas(target, {
      scale: 2000 / target.offsetWidth,
      useCORS: true,
      backgroundColor: '#0a0a0a',
      logging: false
    });
    btn.style.display = '';
    const link = document.createElement('a');
    link.download = '쉐키나_동선표.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  } catch(e) {
    alert('저장 실패: ' + e.message);
  }
  btn.textContent = '📷 이미지로 저장';
  btn.disabled = false;
}

// ══════════════ START ══════════════
init();
</script>
